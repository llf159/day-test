<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>人生若只如初见</title> <!-- 你可以随意改标题 -->
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: "Times New Roman", "Noto Serif SC", "Microsoft YaHei", serif;
      text-align: center;
      color: #6f3644;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.92), transparent 24%),
        radial-gradient(circle at 80% 24%, rgba(255, 218, 228, 0.72), transparent 28%),
        linear-gradient(135deg, #fff7f8 0%, #f9dfe7 42%, #eec7d3 100%);
    }

    body::before,
    body::after {
      position: fixed;
      inset: auto;
      width: 320px;
      height: 320px;
      content: "";
      pointer-events: none;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.45;
    }

    body::before {
      top: -92px;
      left: -82px;
      background: radial-gradient(circle, rgba(255, 128, 160, 0.48), transparent 68%);
    }

    body::after {
      right: -98px;
      bottom: -96px;
      background: radial-gradient(circle, rgba(188, 92, 122, 0.38), transparent 70%);
    }

    .scene {
      position: relative;
      width: min(96vw, 860px);
      padding: 72px 28px;
      isolation: isolate;
    }

    .scene::before {
      position: absolute;
      inset: 18px;
      z-index: -1;
      content: "";
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.34);
      box-shadow:
        0 34px 90px rgba(120, 42, 66, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
    }

    .scene::after {
      display: block;
      width: 92px;
      height: 2px;
      margin: 34px auto 0;
      content: "";
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #a94968, transparent);
      opacity: 0.68;
    }

    #time {
      margin: 0;
      font-size: clamp(2rem, 9vw, 6.5rem);
      font-weight: bold;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      color: #7d2e45;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.72),
        0 18px 42px rgba(126, 45, 68, 0.28);
    }

    .heart {
      position: absolute;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      line-height: 1;
      color: rgba(172, 61, 93, 0.55);
      text-shadow: 0 10px 24px rgba(126, 45, 68, 0.18);
      animation: float 8s ease-in-out infinite;
    }

    .heart:nth-child(1) {
      top: 12%;
      left: 9%;
      font-size: 25px;
      animation-delay: -1s;
    }

    .heart:nth-child(2) {
      right: 11%;
      bottom: 14%;
      font-size: 36px;
      color: rgba(255, 128, 157, 0.55);
      animation-delay: -4s;
    }

    .heart:nth-child(3) {
      right: 17%;
      top: 18%;
      font-size: 20px;
      color: rgba(126, 45, 68, 0.42);
      animation-delay: -6s;
    }

    @keyframes float {
      0%,
      100% {
        translate: 0 0;
      }

      50% {
        translate: 0 -18px;
      }
    }

    @media (max-width: 560px) {
      .scene {
        width: calc(100vw - 28px);
        padding: 58px 12px;
      }

      .scene::before {
        inset: 10px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="scene">
    <span class="heart">♥</span>
    <span class="heart">♥</span>
    <span class="heart">♥</span>
    <div id="time">载入中...</div>
  </main>

<script>
  const start = new Date("2022-10-29T22:00:00"); // 认识的起始时间

  function updateTime() {
    const now = new Date();
    const diffMs = now - start;

    const totalMinutes = Math.floor(diffMs / (1000 * 60));
    const days = Math.floor(totalMinutes / (60 * 24));
    const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24)
                    .toString().padStart(2, '0');
    const minutes = (totalMinutes % 60)
                    .toString().padStart(2, '0');

    document.getElementById("time").innerText =
      `${days} : ${hours} : ${minutes}`;
  }

  updateTime();
  setInterval(updateTime, 1000); // 每秒更新一次
</script>

</body>
</html>
